name: Java CI Setup

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-test-docker:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Shallow clones should be disabled for SonarQube
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        
    - name: Cache SonarSource packages
      uses: actions/cache@v4
      with:
        path: ~/.sonar/cache
        key: ${{ runner.os }}-sonar
        
    - name: Run Tests
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      # To enable SonarQube later, change the below run command to:
      # run: mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=java-microservice -Dsonar.organization=${{ github.repository_owner }} -Dsonar.host.url=https://sonarcloud.io
      run: mvn -B verify
    - name: Build Application Jar
      run: mvn -B package -DskipTests --file pom.xml
      
    - name: Build Docker Image
      run: docker build -t java-microservice:latest .
      
    - name: Run Trivy Security Scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'java-microservice:latest'
        format: 'table'
        exit-code: '0'
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'
